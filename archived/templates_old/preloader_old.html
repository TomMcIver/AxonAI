<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI - Loading</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-900: #1a1a1a;
            --gray-800: #262626;
            --gray-700: #404040;
            --gray-600: #525252;
            --gray-500: #737373;
            --gray-400: #a3a3a3;
            --gray-300: #d4d4d4;
            --gray-200: #e5e5e5;
            --gray-100: #f5f5f5;
            --ai-glow: rgba(255, 255, 255, 0.8);
            --shadow-light: rgba(255, 255, 255, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--black);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preloader-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Classroom Scene */
        .classroom-3d {
            position: relative;
            width: 800px;
            height: 600px;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .classroom-floor {
            position: absolute;
            width: 800px;
            height: 600px;
            background: linear-gradient(180deg, var(--gray-800) 0%, var(--gray-900) 100%);
            transform: rotateX(60deg) translateZ(-100px);
            border: 4px solid var(--gray-600);
            box-shadow: 
                inset 0 0 100px var(--shadow-dark),
                0 20px 40px var(--shadow-dark);
        }

        .classroom-back-wall {
            position: absolute;
            width: 800px;
            height: 400px;
            background: linear-gradient(135deg, var(--gray-800) 0%, var(--gray-700) 100%);
            transform: translateZ(-200px);
            border: 4px solid var(--gray-600);
            top: 50px;
            box-shadow: 
                inset 0 0 50px var(--shadow-dark),
                0 10px 20px var(--shadow-dark);
        }

        .blackboard {
            position: absolute;
            width: 300px;
            height: 200px;
            background: var(--gray-900);
            border: 6px solid var(--gray-500);
            top: 100px;
            left: 250px;
            transform: translateZ(-195px);
            box-shadow: 
                inset 0 0 30px var(--shadow-dark),
                0 5px 10px var(--shadow-dark);
        }

        .teacher-3d {
            position: absolute;
            width: 60px;
            height: 120px;
            background: var(--gray-600);
            border: 3px solid var(--gray-500);
            transform: translateZ(-150px) rotateY(180deg);
            top: 300px;
            left: 370px;
            transition: all 2s ease;
            box-shadow: 
                0 10px 20px var(--shadow-dark),
                inset 0 0 20px var(--shadow-dark);
        }

        .teacher-3d::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 15px;
            width: 30px;
            height: 30px;
            background: var(--gray-500);
            border: 2px solid var(--gray-400);
            border-radius: 0;
        }

        /* 3D Student Desks and Students */
        .student-desk {
            position: absolute;
            width: 80px;
            height: 50px;
            background: var(--gray-700);
            border: 3px solid var(--gray-600);
            transform-style: preserve-3d;
            transition: all 1.5s ease;
            box-shadow: 
                0 8px 16px var(--shadow-dark),
                inset 0 0 20px var(--shadow-dark);
        }

        .student-3d {
            position: absolute;
            width: 40px;
            height: 80px;
            background: var(--gray-700);
            border: 3px solid var(--gray-600);
            top: -80px;
            left: 20px;
            transition: all 2s ease;
            transform-origin: bottom center;
            box-shadow: 
                0 6px 12px var(--shadow-dark),
                inset 0 0 15px var(--shadow-dark);
        }

        .student-3d::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: var(--gray-600);
            border: 2px solid var(--gray-500);
        }

        .student-3d.enlightened {
            background: var(--gray-200);
            border-color: var(--white);
            box-shadow: 
                0 0 30px var(--ai-glow),
                0 6px 12px var(--shadow-dark),
                inset 0 0 15px rgba(255, 255, 255, 0.2);
            animation: studentGlow 3s ease-in-out infinite alternate;
        }

        .laptop-3d {
            position: absolute;
            width: 40px;
            height: 25px;
            background: var(--gray-800);
            border: 2px solid var(--gray-600);
            top: 10px;
            left: 20px;
            transform: rotateX(-20deg);
            transition: all 1s ease;
            box-shadow: 
                0 4px 8px var(--shadow-dark),
                inset 0 0 10px var(--shadow-dark);
        }

        .laptop-3d.open {
            background: var(--gray-200);
            border-color: var(--white);
            box-shadow: 
                0 0 20px var(--ai-glow),
                0 4px 8px var(--shadow-dark),
                inset 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* AI Brain 3D */
        .ai-brain-3d {
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--gray-800);
            border: 4px solid var(--gray-600);
            transform: translateZ(100px) rotateX(-30deg) rotateY(30deg);
            top: 50px;
            right: 50px;
            transition: all 3s ease;
            transform-style: preserve-3d;
            box-shadow: 
                0 15px 30px var(--shadow-dark),
                inset 0 0 30px var(--shadow-dark);
        }

        .ai-brain-3d.active {
            background: var(--white);
            border-color: var(--gray-200);
            box-shadow: 
                0 0 60px var(--ai-glow),
                0 15px 30px var(--shadow-dark),
                inset 0 0 30px rgba(255, 255, 255, 0.5);
            animation: brainPulse 2s ease-in-out infinite alternate;
        }

        .brain-circuits {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid var(--gray-500);
            transition: all 2s ease;
        }

        .ai-brain-3d.active .brain-circuits {
            border-color: var(--gray-800);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .brain-circuits::before,
        .brain-circuits::after {
            content: '';
            position: absolute;
            background: var(--gray-500);
            transition: all 2s ease;
        }

        .brain-circuits::before {
            top: 20px;
            left: -2px;
            right: -2px;
            height: 2px;
        }

        .brain-circuits::after {
            left: 20px;
            top: -2px;
            bottom: -2px;
            width: 2px;
        }

        .ai-brain-3d.active .brain-circuits::before,
        .ai-brain-3d.active .brain-circuits::after {
            background: var(--gray-800);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        /* AI Connection Lines 3D */
        .ai-connection-3d {
            position: absolute;
            height: 4px;
            background: var(--gray-700);
            opacity: 0;
            transition: all 1.5s ease;
            transform-style: preserve-3d;
            box-shadow: 0 2px 4px var(--shadow-dark);
        }

        .ai-connection-3d.active {
            background: var(--white);
            opacity: 1;
            box-shadow: 
                0 0 15px var(--ai-glow),
                0 2px 4px var(--shadow-dark);
            animation: connectionFlow 2s linear infinite;
        }

        /* Position students in 3D classroom */
        .desk-1 { transform: translateZ(0px) rotateY(0deg); top: 350px; left: 200px; }
        .desk-2 { transform: translateZ(0px) rotateY(0deg); top: 350px; left: 320px; }
        .desk-3 { transform: translateZ(0px) rotateY(0deg); top: 350px; left: 440px; }
        .desk-4 { transform: translateZ(0px) rotateY(0deg); top: 350px; left: 560px; }
        .desk-5 { transform: translateZ(50px) rotateY(0deg); top: 420px; left: 180px; }
        .desk-6 { transform: translateZ(50px) rotateY(0deg); top: 420px; left: 300px; }
        .desk-7 { transform: translateZ(50px) rotateY(0deg); top: 420px; left: 420px; }
        .desk-8 { transform: translateZ(50px) rotateY(0deg); top: 420px; left: 540px; }

        /* Loading Text */
        .loading-text {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: bold;
            color: var(--white);
            text-shadow: 0 4px 8px var(--shadow-dark);
            opacity: 0;
            animation: fadeInOut 3s ease-in-out infinite;
        }

        .progress-bar {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 6px;
            background: var(--gray-800);
            border: 2px solid var(--gray-600);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--white);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 20px var(--ai-glow);
        }

        /* Animations */
        @keyframes studentGlow {
            0% { box-shadow: 0 0 20px var(--ai-glow), 0 6px 12px var(--shadow-dark); }
            100% { box-shadow: 0 0 40px var(--ai-glow), 0 6px 12px var(--shadow-dark); }
        }

        @keyframes brainPulse {
            0% { transform: translateZ(100px) rotateX(-30deg) rotateY(30deg) scale(1); }
            100% { transform: translateZ(100px) rotateX(-30deg) rotateY(30deg) scale(1.1); }
        }

        @keyframes connectionFlow {
            0% { box-shadow: 0 0 15px var(--ai-glow), 0 2px 4px var(--shadow-dark); }
            50% { box-shadow: 0 0 30px var(--ai-glow), 0 2px 4px var(--shadow-dark); }
            100% { box-shadow: 0 0 15px var(--ai-glow), 0 2px 4px var(--shadow-dark); }
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Fade out animation */
        .fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
        }
    </style>
</head>
<body>
    <div class="preloader-container">
        <div class="classroom-3d">
            <!-- Classroom Structure -->
            <div class="classroom-floor"></div>
            <div class="classroom-back-wall"></div>
            <div class="blackboard"></div>
            <div class="teacher-3d"></div>

            <!-- AI Brain -->
            <div class="ai-brain-3d">
                <div class="brain-circuits"></div>
            </div>

            <!-- Student Desks and Students -->
            <div class="student-desk desk-1">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-2">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-3">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-4">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-5">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-6">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-7">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>
            <div class="student-desk desk-8">
                <div class="student-3d"></div>
                <div class="laptop-3d"></div>
            </div>

            <!-- AI Connection Lines -->
            <div class="ai-connection-3d" style="top: 170px; right: 110px; width: 200px; transform: rotate(-15deg);"></div>
            <div class="ai-connection-3d" style="top: 180px; right: 150px; width: 180px; transform: rotate(-25deg);"></div>
            <div class="ai-connection-3d" style="top: 190px; right: 200px; width: 160px; transform: rotate(-35deg);"></div>
            <div class="ai-connection-3d" style="top: 200px; right: 250px; width: 140px; transform: rotate(-45deg);"></div>
            <div class="ai-connection-3d" style="top: 220px; right: 120px; width: 220px; transform: rotate(15deg);"></div>
            <div class="ai-connection-3d" style="top: 230px; right: 160px; width: 200px; transform: rotate(25deg);"></div>
            <div class="ai-connection-3d" style="top: 240px; right: 210px; width: 180px; transform: rotate(35deg);"></div>
            <div class="ai-connection-3d" style="top: 250px; right: 260px; width: 160px; transform: rotate(45deg);"></div>
        </div>

        <!-- Loading UI -->
        <div class="loading-text">Initializing AI Education Platform...</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        let progress = 0;
        let currentStep = 0;
        const steps = [
            "Initializing AI Education Platform...",
            "Connecting AI Brain to Classroom...",
            "Activating Student Learning Nodes...",
            "Personalizing Learning Experiences...",
            "Launching EduAI..."
        ];

        function updateProgress() {
            const progressBar = document.querySelector('.progress-fill');
            const loadingText = document.querySelector('.loading-text');
            
            progress += 20;
            progressBar.style.width = progress + '%';
            
            if (currentStep < steps.length) {
                loadingText.textContent = steps[currentStep];
                currentStep++;
            }
        }

        function startAnimation() {
            const aiBrain = document.querySelector('.ai-brain-3d');
            const students = document.querySelectorAll('.student-3d');
            const laptops = document.querySelectorAll('.laptop-3d');
            const connections = document.querySelectorAll('.ai-connection-3d');

            // Step 1: Activate AI Brain (1s)
            setTimeout(() => {
                aiBrain.classList.add('active');
                updateProgress();
            }, 1000);

            // Step 2: Show connections (2s)
            setTimeout(() => {
                connections.forEach((connection, index) => {
                    setTimeout(() => {
                        connection.classList.add('active');
                    }, index * 100);
                });
                updateProgress();
            }, 2000);

            // Step 3: Activate students one by one (3-7s)
            setTimeout(() => {
                students.forEach((student, index) => {
                    setTimeout(() => {
                        student.classList.add('enlightened');
                        laptops[index].classList.add('open');
                        if (index === 3) updateProgress(); // Mid-way through students
                    }, index * 500);
                });
            }, 3000);

            // Step 4: Complete activation (7s)
            setTimeout(() => {
                updateProgress();
            }, 7000);

            // Step 5: Final step and transition (8s)
            setTimeout(() => {
                updateProgress();
                
                // Fade out and redirect after a moment
                setTimeout(() => {
                    document.querySelector('.preloader-container').classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = '/main';
                    }, 1000);
                }, 1000);
            }, 8000);
        }

        // Start the animation sequence
        setTimeout(startAnimation, 500);
    </script>
</body>
</html>
