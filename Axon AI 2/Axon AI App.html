<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AxonAI — School Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Lora', Georgia, serif;
    background: #FDF6EE;
    color: #3D2B1F;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  textarea { font-family: inherit; }
  input { font-family: inherit; }

  /* Responsive grid collapse */
  @media (max-width: 900px) {
    .two-col-grid { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 600px) {
    .shell-main { padding: 16px !important; }
    .shell-header { padding: 12px 16px !important; }
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,120,126,0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(201,120,126,0.5); }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Components — load in dependency order -->
<script type="text/babel" src="app/blossom-shell.jsx"></script>
<script type="text/babel" src="app/landing-page-component.jsx"></script>
<script type="text/babel" src="app/login-page.jsx"></script>
<script type="text/babel" src="app/teacher-page.jsx"></script>
<script type="text/babel" src="app/student-parent-chat.jsx"></script>
<script type="text/babel" src="app/main-router.jsx"></script>
</body>
</html>
