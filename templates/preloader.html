<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI - Loading</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preloader-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Scene Container */
        .scene-container {
            width: 1000px;
            height: 600px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.8));
        }

        /* Glow Animations */
        @keyframes pulseGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4)); 
            }
            50% { 
                filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.8)); 
            }
        }

        @keyframes harmonicPulse {
            0%, 100% { 
                opacity: 0.3;
            }
            50% { 
                opacity: 1;
            }
        }

        @keyframes studentEnlighten {
            0% { 
                fill: #2d2d2d;
                filter: none;
            }
            100% { 
                fill: #d0d0d0;
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
            }
        }

        @keyframes laptopActivate {
            0% { 
                fill: #1a1a1a;
            }
            100% { 
                fill: #a0a0a0;
                filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
            }
        }

        @keyframes connectionFlow {
            0% { 
                stroke-dashoffset: 1000;
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% { 
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        .harmony-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
        }

        .harmony-active {
            animation: connectionFlow 2s ease-in-out forwards;
        }

        .student-enlightened {
            animation: studentEnlighten 1.5s ease-in-out forwards;
        }

        .laptop-active {
            animation: laptopActivate 1s ease-in-out forwards;
        }

        .teacher-ai-side {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        /* Loading UI */
        .loading-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 600px;
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        /* Fade out */
        .fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        /* Floating particles */
        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0); 
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            50% { 
                transform: translateY(-20px) translateX(10px); 
            }
        }

        .particle {
            animation: floatParticle 6s ease-in-out infinite;
        }
    </style>
</head>

        <!-- Loading UI -->
        <div class="loading-container">
            <div class="loading-text">Harmonizing Education</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        let progress = 0;
        let currentStep = 0;
        const steps = [
            "Harmonizing Education",
            "Connecting Human & AI",
            "Activating Learning Network",
            "Personalizing Experiences",
            "Launching TMC Learning"
        ];

        function updateProgress() {
            const progressBar = document.querySelector('.progress-fill');
            const loadingText = document.querySelector('.loading-text');
            
            progress += 20;
            progressBar.style.width = progress + '%';
            
            if (currentStep < steps.length) {
                loadingText.textContent = steps[currentStep];
                currentStep++;
            }
        }

        function startAnimation() {
            const teacherLine = document.querySelector('#teacher-line');
            const robotLine = document.querySelector('#robot-line');
            const harmonyDot = document.querySelector('.central-dot');
            const harmonyText = document.querySelector('#harmony-text');
            const beamLines = document.querySelectorAll('.beam-line');
            const students = document.querySelectorAll('#students g');

            // Step 1: Show teacher and robot with glow, then connection lines (1.5s)
            setTimeout(() => {
                // Show and glow teacher and robot first
                const humanTeacher = document.querySelector('#human-teacher');
                const aiRobot = document.querySelector('#ai-robot');
                
                humanTeacher.style.transition = 'opacity 1s ease-out, filter 1s ease-out';
                aiRobot.style.transition = 'opacity 1s ease-out, filter 1s ease-out';
                humanTeacher.style.opacity = '1';
                aiRobot.style.opacity = '1';
                humanTeacher.style.filter = 'url(#glow)';
                aiRobot.style.filter = 'url(#glow)';
                
                // Then show connection lines
                setTimeout(() => {
                    teacherLine.style.transition = 'all 1.5s ease-out';
                    robotLine.style.transition = 'all 1.5s ease-out';
                    teacherLine.style.opacity = '1';
                    robotLine.style.opacity = '1';
                    teacherLine.style.stroke = '#ffffff';
                    robotLine.style.stroke = '#ffffff';
                }, 500);
                
                updateProgress();
            }, 1500);

            // Step 2: Grow central harmony dot (3.5s)
            setTimeout(() => {
                harmonyDot.style.transition = 'all 2s ease-out';
                harmonyDot.style.r = '20';
                harmonyDot.style.opacity = '1';
                harmonyDot.style.filter = 'drop-shadow(0 0 30px rgba(255, 255, 255, 0.8))';
                harmonyText.style.transition = 'opacity 1s ease-out';
                harmonyText.style.opacity = '1';
                updateProgress();
            }, 3500);

            // Step 3: Beam out to students (6s)
            setTimeout(() => {
                // Set all beams to animate at once with CSS transitions
                beamLines.forEach((beam) => {
                    beam.style.transition = 'opacity 2s cubic-bezier(0.4, 0, 0.2, 1), stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1)';
                    beam.style.strokeDasharray = '500';
                    beam.style.strokeDashoffset = '500';
                });
                
                // Trigger animation
                setTimeout(() => {
                    beamLines.forEach((beam) => {
                        beam.style.opacity = '1';
                        beam.style.strokeDashoffset = '0';
                    });
                }, 50);
                
                updateProgress();
            }, 6000);

            // Step 4: Enlighten students (9s)
            setTimeout(() => {
                students.forEach((student, index) => {
                    setTimeout(() => {
                        student.querySelector('.student-body').classList.add('student-enlightened');
                        student.querySelector('.student-head').classList.add('student-enlightened');
                        student.querySelector('.laptop-screen').classList.add('laptop-active');
                        
                        if (index === students.length - 1) updateProgress();
                    }, index * 300);
                });
            }, 9000);

            // Step 5: Final and redirect (15s)
            setTimeout(() => {
                updateProgress();
                
                setTimeout(() => {
                    document.querySelector('.preloader-container').classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = '/main';
                    }, 1000);
                }, 2000);
            }, 15000);
        }

        // Start animation
        setTimeout(startAnimation, 500);
    </script>
</body>
</html>
