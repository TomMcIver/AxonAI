<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI - Loading</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preloader-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Scene Container */
        .scene-container {
            width: 1000px;
            height: 600px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.8));
        }

        /* Glow Animations */
        @keyframes pulseGlow {
            0%, 100% { 
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4)); 
            }
            50% { 
                filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.8)); 
            }
        }

        @keyframes harmonicPulse {
            0%, 100% { 
                opacity: 0.3;
            }
            50% { 
                opacity: 1;
            }
        }

        @keyframes studentEnlighten {
            0% { 
                fill: #2d2d2d;
                filter: none;
            }
            100% { 
                fill: #d0d0d0;
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
            }
        }

        @keyframes laptopActivate {
            0% { 
                fill: #1a1a1a;
            }
            100% { 
                fill: #a0a0a0;
                filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
            }
        }

        @keyframes connectionFlow {
            0% { 
                stroke-dashoffset: 1000;
                opacity: 0;
            }
            50% {
                opacity: 0.8;
            }
            100% { 
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        .harmony-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
        }

        .harmony-active {
            animation: connectionFlow 2s ease-in-out forwards;
        }

        .student-enlightened {
            animation: studentEnlighten 1.5s ease-in-out forwards;
        }

        .laptop-active {
            animation: laptopActivate 1s ease-in-out forwards;
        }

        .teacher-ai-side {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        /* Loading UI */
        .loading-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 600px;
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 3px;
        }

        /* Fade out */
        .fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        /* Floating particles */
        @keyframes floatParticle {
            0%, 100% { 
                transform: translateY(0) translateX(0); 
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            50% { 
                transform: translateY(-20px) translateX(10px); 
            }
        }

        .particle {
            animation: floatParticle 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="preloader-container">
        <div class="scene-container">
            <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Gradient Definitions -->
                    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#606060;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#909090;stop-opacity:1" />
                    </linearGradient>
                    
                    <linearGradient id="humanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#404040;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#505050;stop-opacity:1" />
                    </linearGradient>

                    <linearGradient id="harmonyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#808080;stop-opacity:0.3" />
                        <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#808080;stop-opacity:0.3" />
                    </linearGradient>

                    <!-- Glow Filter -->
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Background Elements -->
                <rect x="0" y="0" width="1000" height="600" fill="transparent"/>
                
                <!-- Floating Particles -->
                <circle cx="150" cy="150" r="2" fill="#606060" opacity="0" class="particle" style="animation-delay: 0s;"/>
                <circle cx="850" cy="200" r="2" fill="#606060" opacity="0" class="particle" style="animation-delay: 1s;"/>
                <circle cx="200" cy="400" r="2" fill="#606060" opacity="0" class="particle" style="animation-delay: 2s;"/>
                <circle cx="750" cy="450" r="2" fill="#606060" opacity="0" class="particle" style="animation-delay: 3s;"/>
                <circle cx="500" cy="100" r="2" fill="#606060" opacity="0" class="particle" style="animation-delay: 4s;"/>
                
                <!-- Classroom Setting (Kurzgesagt Style) -->
                <rect x="50" y="380" width="900" height="200" fill="#0f0f0f" opacity="0.5" rx="10" ry="10"/>
                
                <!-- Half-Human Half-AI Teacher (Center) -->
                <g id="teacher" transform="translate(500, 200)">
                    <!-- Human Side (Left) -->
                    <g id="human-side">
                        <path d="M -40 20 L -40 80 L -20 100 L -20 120 L -30 120 L -30 140 L -10 140 L -10 100 L 0 90 L 0 20 Z" 
                              fill="url(#humanGradient)" 
                              stroke="#303030" 
                              stroke-width="2"/>
                        <!-- Human Head -->
                        <ellipse cx="-20" cy="0" rx="25" ry="30" fill="#404040" stroke="#303030" stroke-width="2"/>
                        <!-- Human Eye -->
                        <circle cx="-25" cy="-5" r="4" fill="#2a2a2a"/>
                        <!-- Human Arm -->
                        <rect x="-50" y="40" width="12" height="40" fill="#404040" stroke="#303030" stroke-width="2" rx="6" ry="6"/>
                    </g>
                    
                    <!-- AI Side (Right) -->
                    <g id="ai-side" class="teacher-ai-side">
                        <path d="M 0 20 L 0 90 L 10 100 L 10 120 L 20 120 L 20 140 L 30 140 L 30 120 L 40 120 L 40 80 L 40 20 Z" 
                              fill="url(#aiGradient)" 
                              stroke="#606060" 
                              stroke-width="2"/>
                        <!-- AI Head -->
                        <ellipse cx="20" cy="0" rx="25" ry="30" fill="#808080" stroke="#606060" stroke-width="2"/>
                        <!-- AI Eye (Digital) -->
                        <rect x="15" y="-10" width="10" height="10" fill="#b0b0b0" stroke="#909090" stroke-width="1"/>
                        <rect x="17" y="-8" width="6" height="6" fill="#ffffff" opacity="0.8"/>
                        <!-- AI Arm with Circuits -->
                        <rect x="38" y="40" width="12" height="40" fill="#808080" stroke="#606060" stroke-width="2" rx="6" ry="6"/>
                        <line x1="41" y1="50" x2="47" y2="50" stroke="#b0b0b0" stroke-width="1"/>
                        <line x1="41" y1="60" x2="47" y2="60" stroke="#b0b0b0" stroke-width="1"/>
                        <line x1="41" y1="70" x2="47" y2="70" stroke="#b0b0b0" stroke-width="1"/>
                    </g>
                    
                    <!-- Harmony Symbol (Center of Teacher) -->
                    <g id="harmony-symbol" opacity="0" class="harmony-pulse">
                        <circle cx="0" cy="0" r="15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
                        <circle cx="0" cy="0" r="10" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
                        <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
                    </g>
                </g>
                
                <!-- Students (Kurzgesagt Style) -->
                <g id="students">
                    <!-- Row 1 -->
                    <g id="student1" transform="translate(200, 400)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student2" transform="translate(350, 400)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student3" transform="translate(500, 400)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student4" transform="translate(650, 400)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student5" transform="translate(800, 400)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <!-- Row 2 -->
                    <g id="student6" transform="translate(275, 480)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student7" transform="translate(425, 480)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student8" transform="translate(575, 480)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                    
                    <g id="student9" transform="translate(725, 480)">
                        <ellipse cx="0" cy="-20" rx="18" ry="20" fill="#2d2d2d" class="student-body"/>
                        <rect x="-10" y="0" width="20" height="30" fill="#2d2d2d" class="student-torso"/>
                        <rect x="-20" y="25" width="40" height="20" fill="#1a1a1a" class="laptop" rx="3" ry="3"/>
                        <rect x="-18" y="27" width="36" height="14" fill="#0d0d0d" class="laptop-screen" rx="2" ry="2"/>
                    </g>
                </g>
                
                <!-- Harmony Connection Lines -->
                <g id="harmony-connections">
                    <!-- From Teacher to Students -->
                    <path d="M 500 340 Q 350 370, 200 380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 Q 425 360, 350 380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 L 500 380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 Q 575 360, 650 380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 Q 650 370, 800 380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    
                    <!-- Second Row -->
                    <path d="M 500 340 Q 375 410, 275 460" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 Q 450 400, 425 460" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 Q 550 400, 575 460" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                    <path d="M 500 340 Q 625 410, 725 460" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          fill="none" 
                          class="harmony-line" 
                          filter="url(#glow)"/>
                </g>
                
                <!-- Harmony Text -->
                <text x="500" y="100" font-family="Arial, sans-serif" font-size="24" fill="#808080" text-anchor="middle" opacity="0" id="harmony-text">
                    Human + AI = Harmony
                </text>
            </svg>
        </div>

        <!-- Loading UI -->
        <div class="loading-container">
            <div class="loading-text">Harmonizing Education</div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        let progress = 0;
        let currentStep = 0;
        const steps = [
            "Harmonizing Education",
            "Connecting Human & AI",
            "Activating Learning Network",
            "Personalizing Experiences",
            "Launching EduAI"
        ];

        function updateProgress() {
            const progressBar = document.querySelector('.progress-fill');
            const loadingText = document.querySelector('.loading-text');
            
            progress += 20;
            progressBar.style.width = progress + '%';
            
            if (currentStep < steps.length) {
                loadingText.textContent = steps[currentStep];
                currentStep++;
            }
        }

        function startAnimation() {
            const harmonySymbol = document.querySelector('#harmony-symbol');
            const harmonyText = document.querySelector('#harmony-text');
            const connections = document.querySelectorAll('.harmony-line');
            const students = document.querySelectorAll('#students g');

            // Step 1: Show harmony in teacher (1s)
            setTimeout(() => {
                harmonySymbol.style.opacity = '1';
                harmonySymbol.classList.add('harmony-pulse');
                harmonySymbol.style.animation = 'harmonicPulse 2s ease-in-out infinite';
                harmonyText.style.opacity = '0.8';
                updateProgress();
            }, 1000);

            // Step 2: Activate connections (2.5s)
            setTimeout(() => {
                connections.forEach((connection, index) => {
                    setTimeout(() => {
                        connection.classList.add('harmony-active');
                    }, index * 150);
                });
                updateProgress();
            }, 2500);

            // Step 3: Enlighten students (4s)
            setTimeout(() => {
                students.forEach((student, index) => {
                    setTimeout(() => {
                        student.querySelector('.student-body').classList.add('student-enlightened');
                        student.querySelector('.student-torso').classList.add('student-enlightened');
                        student.querySelector('.laptop-screen').classList.add('laptop-active');
                        
                        if (index === 4) updateProgress();
                    }, index * 300);
                });
            }, 4000);

            // Step 4: Progress update (7s)
            setTimeout(() => {
                updateProgress();
            }, 7000);

            // Step 5: Final and redirect (9s)
            setTimeout(() => {
                updateProgress();
                
                setTimeout(() => {
                    document.querySelector('.preloader-container').classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = '/main';
                    }, 1000);
                }, 1500);
            }, 9000);
        }

        // Start animation
        setTimeout(startAnimation, 500);
    </script>
</body>
</html>
