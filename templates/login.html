{% extends "base.html" %}

{% block title %}Login - TMC Learning{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header text-center bg-dark text-white">
                <h3><i class="fas fa-graduation-cap me-2"></i>TMC Learning</h3>
                <p class="mb-0 small">Select your role to login</p>
            </div>
            <div class="card-body p-4">
                <div class="row g-3">
                    <!-- Admin Login Button -->
                    <div class="col-12">
                        <form method="POST" style="display: inline;">
                            <input type="hidden" name="user_type" value="admin">
                            <button type="submit" class="btn btn-primary w-100 py-3" style="border: 2px solid #000;">
                                <i class="fas fa-user-shield fa-2x d-block mb-2"></i>
                                <span class="fs-5">Admin Login</span>
                            </button>
                        </form>
                    </div>

                    <!-- Teacher Login Button -->
                    <div class="col-12">
                        <form method="POST" style="display: inline;">
                            <input type="hidden" name="user_type" value="teacher">
                            <button type="submit" class="btn btn-success w-100 py-3" style="border: 2px solid #000;">
                                <i class="fas fa-chalkboard-teacher fa-2x d-block mb-2"></i>
                                <span class="fs-5">Teacher Login</span>
                            </button>
                        </form>
                    </div>

                    <!-- Student Login Button -->
                    <div class="col-12">
                        <form method="POST" style="display: inline;">
                            <input type="hidden" name="user_type" value="student">
                            <button type="submit" class="btn btn-info w-100 py-3" style="border: 2px solid #000;">
                                <i class="fas fa-user-graduate fa-2x d-block mb-2"></i>
                                <span class="fs-5">Student Login</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
