{% extends "base.html" %}

{% block title %}Login - TMC Learning{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header text-center bg-primary text-white">
                <h3><i class="fas fa-graduation-cap me-2"></i>TMC Learning</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <!-- User Type Selection -->
                    <div class="mb-4">
                        <label class="form-label">I am a:</label>
                        <div class="row">
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="user_type" id="admin" value="admin" required>
                                <label class="btn btn-outline-primary w-100" for="admin">
                                    <i class="fas fa-user-shield d-block mb-1"></i>
                                    Admin
                                </label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="user_type" id="teacher" value="teacher" required>
                                <label class="btn btn-outline-success w-100" for="teacher">
                                    <i class="fas fa-chalkboard-teacher d-block mb-1"></i>
                                    Teacher
                                </label>
                            </div>
                            <div class="col-4">
                                <input type="radio" class="btn-check" name="user_type" id="student" value="student" required>
                                <label class="btn btn-outline-info w-100" for="student">
                                    <i class="fas fa-user-graduate d-block mb-1"></i>
                                    Student
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <!-- Password Input -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-1"></i>Login
                    </button>
                </form>

                <!-- Demo Credentials -->
                <div class="mt-4">
                    <h6 class="text-muted">Demo Credentials:</h6>
                    <small class="text-muted">
                        <strong>Admin:</strong> admin@admin.com / admin123<br>
                        <strong>Teacher:</strong> teacher@teacher.com / teacher123<br>
                        <strong>Student:</strong> student@student.com / student123
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
