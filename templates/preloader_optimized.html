<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMC Learning - Loading</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preloader-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            opacity: 0;
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Scene Container with Hardware Acceleration */
        .scene-container {
            width: 1000px;
            height: 600px;
            position: relative;
            transform: translateZ(0);
            will-change: transform;
            backface-visibility: hidden;
            perspective: 1000px;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.8));
            transform: translate3d(0, 0, 0);
            will-change: filter;
        }

        /* Main Characters with CSS Animations */
        .teacher-character {
            opacity: 0;
            transform: translate3d(0, 0, 0);
            animation: characterAppear 1s ease-out 0.5s forwards;
            will-change: opacity, filter;
        }

        .robot-character {
            opacity: 0;
            transform: translate3d(0, 0, 0);
            animation: characterAppear 1s ease-out 0.5s forwards;
            will-change: opacity, filter;
        }

        @keyframes characterAppear {
            to {
                opacity: 1;
                filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
            }
        }

        /* Connection Lines with CSS Animations */
        .connection-line {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            opacity: 0;
            transform: translate3d(0, 0, 0);
            will-change: stroke-dashoffset, opacity;
        }

        .teacher-connection {
            animation: drawLine 1.5s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
        }

        .robot-connection {
            animation: drawLine 1.5s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
                opacity: 1;
            }
        }

        /* Central Harmony Dot */
        .harmony-dot {
            opacity: 0;
            transform: translate3d(0, 0, 0) scale(0);
            animation: harmonyPulse 1s ease-out 3s forwards;
            will-change: transform, opacity;
        }

        @keyframes harmonyPulse {
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
            }
        }

        /* Beam Lines to Students */
        .knowledge-beam {
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            opacity: 0;
            transform: translate3d(0, 0, 0);
            will-change: stroke-dashoffset, opacity;
        }

        .beam-1 { animation: beamShoot 1s ease-out 4s forwards; }
        .beam-2 { animation: beamShoot 1s ease-out 4.1s forwards; }
        .beam-3 { animation: beamShoot 1s ease-out 4.2s forwards; }
        .beam-4 { animation: beamShoot 1s ease-out 4.3s forwards; }
        .beam-5 { animation: beamShoot 1s ease-out 4.4s forwards; }
        .beam-6 { animation: beamShoot 1s ease-out 4.5s forwards; }
        .beam-7 { animation: beamShoot 1s ease-out 4.6s forwards; }
        .beam-8 { animation: beamShoot 1s ease-out 4.7s forwards; }

        @keyframes beamShoot {
            to {
                stroke-dashoffset: 0;
                opacity: 0.8;
            }
        }

        /* Students */
        .student-group {
            opacity: 0.3;
            transform: translate3d(0, 0, 0);
            will-change: opacity, filter;
        }

        .student-1 { animation: enlightenStudent 1s ease-out 5s forwards; }
        .student-2 { animation: enlightenStudent 1s ease-out 5.1s forwards; }
        .student-3 { animation: enlightenStudent 1s ease-out 5.2s forwards; }
        .student-4 { animation: enlightenStudent 1s ease-out 5.3s forwards; }
        .student-5 { animation: enlightenStudent 1s ease-out 5.4s forwards; }
        .student-6 { animation: enlightenStudent 1s ease-out 5.5s forwards; }
        .student-7 { animation: enlightenStudent 1s ease-out 5.6s forwards; }
        .student-8 { animation: enlightenStudent 1s ease-out 5.7s forwards; }

        @keyframes enlightenStudent {
            to {
                opacity: 1;
                filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
            }
        }

        /* Harmony Text */
        .harmony-message {
            opacity: 0;
            animation: fadeInText 2s ease-out 6s forwards;
        }

        @keyframes fadeInText {
            to { opacity: 0.9; }
        }

        /* Loading UI */
        .loading-container {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 600px;
        }

        .loading-text {
            font-size: 1.4rem;
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffffff 0%, #cccccc 100%);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate3d(0, 0, 0);
            will-change: width;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: progressAnimation 15s linear forwards;
        }

        @keyframes progressAnimation {
            0% { width: 0%; }
            10% { width: 20%; }
            30% { width: 40%; }
            50% { width: 60%; }
            70% { width: 80%; }
            100% { width: 100%; }
        }

        /* Loading Text Changes */
        .loading-text::after {
            content: "Harmonizing Education";
            animation: textRotate 15s steps(1) forwards;
        }

        @keyframes textRotate {
            0% { content: "Harmonizing Education"; }
            20% { content: "Connecting Human & AI"; }
            40% { content: "Activating Learning Network"; }
            60% { content: "Personalizing Experiences"; }
            80% { content: "Launching TMC Learning"; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .scene-container {
                transform: scale(0.6) translateZ(0);
                transform-origin: center;
            }
            
            .loading-container {
                width: 90%;
            }
        }

        /* Disable animations for reduced motion preference */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="preloader-container">
        <div class="scene-container">
            <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
                <!-- Gradients and Filters -->
                <defs>
                    <linearGradient id="teacherGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#cccccc;stop-opacity:1" />
                    </linearGradient>
                    
                    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:1" />
                    </linearGradient>
                    
                    <linearGradient id="harmonyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#dddddd;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
                    </linearGradient>
                    
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Human Teacher (Left) -->
                <g class="teacher-character">
                    <ellipse cx="200" cy="220" rx="30" ry="35" fill="url(#teacherGradient)"/>
                    <rect x="180" y="255" width="40" height="60" fill="#808080"/>
                    <rect x="170" y="255" width="15" height="45" fill="#606060"/>
                    <rect x="215" y="255" width="15" height="45" fill="#606060"/>
                    <rect x="185" y="315" width="12" height="40" fill="#505050"/>
                    <rect x="203" y="315" width="12" height="40" fill="#505050"/>
                    <path d="M 200 205 Q 180 195 175 200 T 170 210" stroke="#404040" stroke-width="2" fill="none"/>
                    <path d="M 200 205 Q 220 195 225 200 T 230 210" stroke="#404040" stroke-width="2" fill="none"/>
                    <circle cx="190" cy="215" r="2" fill="#303030"/>
                    <circle cx="210" cy="215" r="2" fill="#303030"/>
                    <ellipse cx="200" cy="225" rx="2" ry="1" fill="#404040"/>
                    <path d="M 195 230 Q 200 233 205 230" stroke="#505050" stroke-width="1" fill="none"/>
                </g>

                <!-- AI Robot (Right) -->
                <g class="robot-character">
                    <rect x="770" y="200" width="50" height="50" fill="url(#robotGradient)" rx="5"/>
                    <rect x="775" y="250" width="40" height="50" fill="#909090"/>
                    <rect x="765" y="260" width="12" height="30" fill="#707070"/>
                    <rect x="813" y="260" width="12" height="30" fill="#707070"/>
                    <rect x="775" y="300" width="15" height="40" fill="#606060"/>
                    <rect x="800" y="300" width="15" height="40" fill="#606060"/>
                    <circle cx="785" cy="215" r="5" fill="#000000">
                        <animate attributeName="fill" values="#000000;#ffffff;#000000" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="805" cy="215" r="5" fill="#000000">
                        <animate attributeName="fill" values="#000000;#ffffff;#000000" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <rect x="785" y="230" width="20" height="3" fill="#404040"/>
                    <circle cx="795" cy="180" r="3" fill="#ff0000">
                        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
                    </circle>
                </g>

                <!-- Connection Lines -->
                <line x1="230" y1="250" x2="500" y2="250" 
                      stroke="#ffffff" 
                      stroke-width="3" 
                      class="connection-line teacher-connection"/>
                
                <line x1="770" y1="250" x2="500" y2="250" 
                      stroke="#ffffff" 
                      stroke-width="3" 
                      class="connection-line robot-connection"/>

                <!-- Central Harmony Dot -->
                <circle cx="500" cy="250" r="20" fill="url(#harmonyGradient)" 
                        class="harmony-dot" filter="url(#glow)"/>

                <!-- Students (8 total) -->
                <g id="students">
                    <!-- Row 1 (y=380) -->
                    <g class="student-group student-1" transform="translate(200, 380)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <g class="student-group student-2" transform="translate(350, 380)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <g class="student-group student-3" transform="translate(650, 380)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <g class="student-group student-4" transform="translate(800, 380)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <!-- Row 2 (y=480) -->
                    <g class="student-group student-5" transform="translate(200, 480)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <g class="student-group student-6" transform="translate(350, 480)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <g class="student-group student-7" transform="translate(650, 480)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                    
                    <g class="student-group student-8" transform="translate(800, 480)">
                        <ellipse cx="0" cy="0" rx="18" ry="20" fill="#404040"/>
                        <rect x="-12" y="20" width="24" height="30" fill="#333333"/>
                        <rect x="-20" y="50" width="40" height="20" fill="#2a2a2a"/>
                        <rect x="-15" y="45" width="30" height="8" fill="#808080"/>
                    </g>
                </g>

                <!-- Knowledge Beams -->
                <g id="beams">
                    <!-- Row 1 Beams -->
                    <line x1="500" y1="250" x2="200" y2="380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-1" 
                          filter="url(#glow)"/>
                    <line x1="500" y1="250" x2="350" y2="380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-2" 
                          filter="url(#glow)"/>
                    <line x1="500" y1="250" x2="650" y2="380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-3" 
                          filter="url(#glow)"/>
                    <line x1="500" y1="250" x2="800" y2="380" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-4" 
                          filter="url(#glow)"/>
                    
                    <!-- Row 2 Beams -->
                    <line x1="500" y1="250" x2="200" y2="480" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-5" 
                          filter="url(#glow)"/>
                    <line x1="500" y1="250" x2="350" y2="480" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-6" 
                          filter="url(#glow)"/>
                    <line x1="500" y1="250" x2="650" y2="480" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-7" 
                          filter="url(#glow)"/>
                    <line x1="500" y1="250" x2="800" y2="480" 
                          stroke="url(#harmonyGradient)" 
                          stroke-width="3" 
                          class="knowledge-beam beam-8" 
                          filter="url(#glow)"/>
                </g>
                
                <!-- Harmony Text -->
                <text x="500" y="100" 
                      font-family="Arial, sans-serif" 
                      font-size="24" 
                      fill="#ffffff" 
                      text-anchor="middle" 
                      class="harmony-message">
                    Teacher + AI = Every Student Seen
                </text>
            </svg>
        </div>

        <!-- Loading UI -->
        <div class="loading-container">
            <div class="loading-text"></div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Ensure smooth animation start
        window.addEventListener('load', () => {
            // Force GPU acceleration
            const container = document.querySelector('.preloader-container');
            container.style.transform = 'translate3d(0,0,0)';
            
            // Redirect after animation completes
            setTimeout(() => {
                window.location.href = '/';
            }, 15000);
        });

        // Prevent animation jank on visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Pause animations when tab is not visible
                document.querySelectorAll('*').forEach(el => {
                    if (el.style.animationPlayState !== undefined) {
                        el.style.animationPlayState = 'paused';
                    }
                });
            } else {
                // Resume animations when tab becomes visible
                document.querySelectorAll('*').forEach(el => {
                    if (el.style.animationPlayState !== undefined) {
                        el.style.animationPlayState = 'running';
                    }
                });
            }
        });
    </script>
</body>
</html>
